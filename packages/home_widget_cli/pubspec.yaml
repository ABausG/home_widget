name: home_widget_cli
description: CLI to scaffold native widget code for the home_widget plugin.
version: 0.1.0
repository: https://github.com/ABausG/home_widget

environment:
  sdk: '>=3.5.0 <4.0.0'
resolution: workspace

dependencies:
  args: ^2.5.0
  analyzer: ^7.3.0
  path: ^1.9.0
  xml: ^6.5.0
  home_widget_generator: ^0.0.1
  mason_logger: ^0.3.3
  dart_style: ^3.0.0

dev_dependencies:
  lints: ^5.1.1
  mocktail: ^1.0.4
  test: ^1.25.8

executables:
  home_widget: home_widget


