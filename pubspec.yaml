name: home_widget_workspace
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  - packages/home_widget
  - packages/home_widget_cli
  - packages/home_widget_generator
  - packages/home_widget/example
  - examples/configurable_widget
  - examples/lockscreen_widgets
  - examples/file_and_images
  - examples/generator_basics

dev_dependencies:
  melos: ^7.0.0

melos:
  repository: https://github.com/abausg/home_widget
  command:
    version:
      branch: main
  scripts:
    analyze:
      description: Analyze all packages with dart analyze
      run: melos exec -- dart analyze
    format:all:
      description: Format Dart, Kotlin, and Swift Files
      steps:
        - format:dart
        - format:kotlin
        - format:swift
    format:dart:
      description: Format Dart Files
      run: |
        dart format . --set-exit-if-changed
    format:kotlin:
      description: Format Kotlin Files
      run: ktfmt . --set-exit-if-changed
    format:swift:
      description: Format Swift Files
      run: |
        swift-format -r -i -p .
        swift-format lint -r -s .
    build:android:examples:
      description: Build Android examples
      exec: flutter build apk --release
      packageFilters:
        dirExists: android
        ignore: home_widget
    build:ios:examples:
      description: Build iOS examples
      exec: flutter build ios --release --no-codesign
      packageFilters:
        dirExists: ios
        ignore: home_widget
    test:
      description: Run all unit tests (excludes integration)
      steps:
        - test:flutter
        - test:dart
    test:flutter:
      description: Run Flutter unit tests (excludes integration)
      exec: flutter test -x integration
      packageFilters:
        flutter: true
        dirExists: test
    test:dart:
      description: Run Dart-only unit tests (excludes integration)
      exec: dart test -x integration
      packageFilters:
        flutter: false
        dirExists: test
    test:coverage:dart:
      description: Run Dart-only unit tests with coverage (excludes integration)
      exec: |
        dart test --coverage=coverage -x integration
        dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib --base-directory=$MELOS_ROOT_PATH --package=.
      packageFilters:
        flutter: false
        dirExists: test
    test:cli:integration:
      description: Run all CLI integration tests
      exec: dart test -t integration
      packageFilters:
        scope: home_widget_cli
    test:cli:integration:android:
      description: Run CLI Android integration tests
      exec: dart test -t integration_android
      packageFilters:
        scope: home_widget_cli
    test:cli:integration:ios:
      description: Run CLI iOS integration tests
      exec: dart test -t integration_ios
      packageFilters:
        scope: home_widget_cli
